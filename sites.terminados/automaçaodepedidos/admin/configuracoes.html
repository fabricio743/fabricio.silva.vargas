<h2>Configurações</h2>

<div class="config-card">

<h3>Empresa</h3>

<label>Nome da Empresa</label>
<input type="text" value="Assados Bonito">

<label>WhatsApp</label>
<input type="text" value="55999999999">

<label>Logo</label>
<input type="file">

<hr>

<h3>Entrega</h3>

<label>Taxa de Entrega</label>
<input type="number" value="5">

<label>Pedido Mínimo</label>
<input type="number" value="20">

<hr>

<h3>PIX</h3>

<label>Nome do Recebedor</label>
<input type="text">

<label>Chave PIX</label>
<input type="text">

<label>Tipo da Chave</label>

<select>
<option>Telefone</option>
<option>CPF</option>
<option>Email</option>
<option>Aleatória</option>
</select>

<hr>

<h3>Sistema</h3>

<label>Máximo de Pedidos por Horário</label>
<input type="number" value="5">

<label>Tempo entre Horários</label>

<select>
<option>15 minutos</option>
<option selected>30 minutos</option>
<option>60 minutos</option>
</select>

<button class="salvar">
Salvar Configurações
</button>
