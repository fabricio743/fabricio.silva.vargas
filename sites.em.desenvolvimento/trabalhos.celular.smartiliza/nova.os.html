<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova OS - Smartiliza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- CABEÇALHO -->
    <div class="header">

        <div class="logo-area">
            <img src="logo.png" alt="Smartiliza">
            <div>
                <h1>Smartiliza</h1>
                <span>Assistência Técnica</span>
            </div>
        </div>

        <div class="titulo-pagina">
            Nova Ordem de Serviço
        </div>

    </div>

    <!-- MENU -->
    <nav class="menu-central">

        <a href="index.html">
            Dashboard
        </a>

        <a href="nova.os.html" class="ativo">
            Nova OS
        </a>

        <a href="ordens.html">
            Ordens de Serviço
        </a>

        <a href="estoque.html">
            Estoque de Peças
        </a>

        <a href="financeiro.html">
            Financeiro
        </a>

    </nav>

    <!-- FORMULÁRIO DE ORDEM DE SERVIÇO -->
    <div class="card">

        <form id="osForm">

            <div class="grid">

                <div class="grupo">
                    <label>Nº da OS</label>
                    <input type="text" id="os">
                </div>

                <div class="grupo">
                    <label>Data</label>
                    <input type="date" id="data">
                </div>

                <div class="grupo">
                    <label>Nome do Cliente</label>
                    <input type="text" id="cliente">
                </div>

                <div class="grupo">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>

                <div class="grupo grupo-full">
                    <label>Modelo do Aparelho</label>
                    <input type="text" id="modelo">
                </div>

                <div class="grupo grupo-full">
                    <label>Defeito Relatado</label>
                    <textarea id="defeito"></textarea>
                </div>

                <div class="grupo grupo-full">
                    <label>Laudo Técnico</label>
                    <textarea id="laudo"></textarea>
                </div>

                <div class="grupo">
                    <label>Custo da Peça (R$)</label>
                    <input type="number" step="0.01" id="custoPeca">
                </div>

                <div class="grupo">
                    <label>Orçamento (R$)</label>
                    <input type="number" step="0.01" id="orcamento">
                </div>

                <div class="grupo">
                    <label>Fornecedor da Peça</label>
                    <input 
                        type="text" 
                        id="fornecedor" 
                        placeholder="Ex: BringIT, AliExpress, Mercado Livre"
                    >
                </div>

                <div class="grupo">
                    <label>Status</label>
                    <select id="status">
                        <option>Em análise</option>
                        <option>Aguardando peça</option>
                        <option>Finalizado</option>
                        <option>Retirado</option>
                        <option>Sem conserto</option>
                    </select>
                </div>

            </div>

            <button type="submit">
                Salvar Ordem de Serviço
            </button>

        </form>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/os.js"></script>

</body>
</html>
