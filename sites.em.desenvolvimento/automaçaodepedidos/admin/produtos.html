<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produtos</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="sidebar">

<div class="logo">
🍖 Assados Bonito
</div>

        <nav>

            <a href="index.html">
                🏠 Dashboard
            </a>

            <a href="pedidos.html">
                📦 Pedidos
            </a>

            <a href="produtos.html" class="active">
                🍗 Produtos
            </a>

            <a href="estoque.html">
                📊 Estoque
            </a>

            <a href="agenda.html">
                📅 Agenda
            </a>

            <a href="financeiro.html">
                💰 Financeiro
            </a>

            <a href="configuracoes.html">
                ⚙ Configurações
            </a>

        </nav>

</div>

<main class="content">

<header class="topbar">

<h2>Produtos</h2>

<button
    class="novo-produto"
    onclick="novoProduto()">

    + Novo Produto

</button>

</header>

<div
    class="produtos-grid"
    id="listaProdutos">

</div>

<div class="modal" id="modalProduto">

    <div class="modal-content">

        <h3 id="tituloModal">
            Novo Produto
        </h3>

        <input
            type="hidden"
            id="produtoId">

        <input
            type="text"
            id="nomeProduto"
            placeholder="Nome">

        <textarea
            id="descricaoProduto"
            placeholder="Descrição"></textarea>

        <input
            type="number"
            id="precoProduto"
            placeholder="Preço">

        <input
            type="hidden"
            id="estoqueProduto"
            value="0">

        <input
            type="hidden"
            id="imagemAtualProduto">

        <input
            type="file"
            id="imagemProduto"
            accept="image/*">

        <div id="previewImagemProduto" class="preview-imagem-produto">

        </div>

        <input
            type="text"
            id="categoriaProduto"
            placeholder="Categoria">

        <div class="modal-acoes">

            <button
                onclick="fecharModal()">

                Cancelar

            </button>

            <button
                onclick="salvarProduto()">

                Salvar

            </button>

        </div>

    </div>

</div>
</main>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>

</body>

</html>
