            <span>Hoje</span>
            <h1 id="financeiroHoje">R$ 0,00</h1>

        <div class="card">
            <span>Semana</span>

        </div>

            <span>Mês</span>
            <h1 id="financeiroMes">R$ 0,00</h1>
        </div>

        <div class="card">
            <span>Pedidos</span>
            <h1 id="financeiroPedidos">0</h1>
        </div>

    </section>

    <div class="box">

        <h3>Formas de Pagamento</h3>

        <div class="financeiro-item">
            <span>PIX</span>
            <strong id="financeiroPix">R$ 0,00</strong>
        </div>

        <div class="financeiro-item">
            <span>Dinheiro</span>
            <strong id="financeiroDinheiro">R$ 0,00</strong>
        </div>

        <div class="financeiro-item">
            <span>Cartão</span>
            <strong id="financeiroCartao">R$ 0,00</strong>
        </div>

    </div>

    <div class="box">

        <h3>Produtos Mais Vendidos</h3>

        <ol id="produtosMaisVendidos">

        </ol>

    </div>

    <div class="box">

        <h3>Últimos Recebimentos</h3>

        <div id="ultimosRecebimentos">

        </div>
