<header class="topbar">

<h2>Estoque</h2>

<input
type="text"
class="busca"
placeholder="Buscar produto..."
>

<div class="estoque-grid">

<div class="estoque-card">

<h3>🍖 Frango Recheado</h3>

<h1>30</h1>

<span>Estoque Atual</span>

<div class="barra">
<div class="progresso" style="width:75%"></div>
</div>

<p>Mínimo: 10</p>

<div class="status-ok">
🟢 Estoque Normal
</div>

<div class="acoes">

<button>-</button>

<button>+</button>

</div>

</div>

<div class="estoque-card">

<h3>🍖 Costela</h3>

<h1>4</h1>

<span>Estoque Atual</span>

<div class="barra">
<div class="progresso-baixo" style="width:20%"></div>
</div>

<p>Mínimo: 10</p>

<div class="status-baixo">
🔴 Estoque Baixo
</div>

<div class="acoes">

<button>-</button>

<button>+</button>

</div>

</div>

</div>
