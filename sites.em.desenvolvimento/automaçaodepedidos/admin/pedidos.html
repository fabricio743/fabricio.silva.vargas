<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="sidebar">

<div class="logo">
🍖 Assados Bonito
</div>

       <nav>

            <a href="index.html">
                🏠 Dashboard
            </a>

            <a href="pedidos.html" class="active">
                📦 Pedidos
            </a>

            <a href="produtos.html">
                🍗 Produtos
            </a>

            <a href="estoque.html">
                📊 Estoque
            </a>

            <a href="agenda.html">
                📅 Agenda
            </a>

            <a href="financeiro.html">
                💰 Financeiro
            </a>

            <a href="configuracoes.html">
                ⚙ Configurações
            </a>

        </nav>

</div>

<main class="content">

<header class="topbar">

<h2>Pedidos</h2>

</header>

<div class="filtros">

<input
type="text"
id="buscaPedido"
placeholder="Buscar pedido..."
>

<div class="filtros-status">

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Todos" 
            checked
        >
        Todos
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Recebido"
        >
        Recebido
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Preparando"
        >
        Preparando
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Pronto"
        >
        Pronto
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Entregue"
        >
        Entregue
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Cancelado"
        >
        Cancelado
    </label>

</div>

</div>

<div
    class="pedidos-grid"
    id="listaPedidos">

</div>

</main>

<div id="modalDetalhesPedido" class="modal-detalhes-pedido">

    <div class="modal-detalhes-conteudo">

        <div class="modal-detalhes-header">
            <div>
                <h2>Detalhes do Pedido</h2>
                <span id="detalheNumeroPedido">PED-000</span>
            </div>

            <button onclick="fecharDetalhesPedido()" class="btn-fechar-modal">
                ×
            </button>
        </div>

        <div id="conteudoDetalhesPedido" class="modal-detalhes-body">
            <!-- conteúdo gerado pelo JS -->
        </div>

    </div>

</div>

<div id="modalEditarPedido" class="modal-detalhes-pedido">

    <div class="modal-detalhes-conteudo">

        <div class="modal-detalhes-header">
            <div>
                <h2>Editar Pedido</h2>
                <span id="editarNumeroPedido">PED-000</span>
            </div>

            <button onclick="fecharEditarPedido()" class="btn-fechar-modal">
                ×
            </button>
        </div>

        <div class="modal-detalhes-body">

            <input type="hidden" id="editarPedidoId">

            <div class="form-grid-editar">

                <div class="campo">
                    <label>Cliente</label>
                    <input type="text" id="editarCliente">
                </div>

                <div class="campo">
                    <label>WhatsApp</label>
                    <input type="text" id="editarTelefone">
                </div>

                <div class="campo">
                    <label>Data</label>
                    <input type="date" id="editarData">
                </div>

                <div class="campo">
                    <label>Horário</label>
                    <input type="time" id="editarHorario">
                </div>

                <div class="campo">
                    <label>Status</label>
                    <select id="editarStatus">
                        <option>Recebido</option>
                        <option>Preparando</option>
                        <option>Pronto</option>
                        <option>Entregue</option>
                        <option>Cancelado</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Pagamento</label>
                    <select id="editarPagamento">
                        <option>PIX</option>
                        <option>Dinheiro</option>
                        <option>Cartão</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Tipo</label>
                    <select id="editarTipo" onchange="controlarEnderecoEdicao()">
                        <option>Retirada</option>
                        <option>Entrega</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Total</label>
                    <input type="number" id="editarTotal" step="0.01">
                </div>

            </div>

            <div id="editarEnderecoBox" class="detalhe-card" style="margin-top: 14px;">

                <h3>📍 Endereço</h3>

                <div class="form-grid-editar">

                    <div class="campo">
                        <label>Município</label>
                        <input type="text" id="editarMunicipio">
                    </div>

                    <div class="campo">
                        <label>Rua</label>
                        <input type="text" id="editarRua">
                    </div>

                    <div class="campo">
                        <label>Número</label>
                        <input type="text" id="editarNumeroEndereco">
                    </div>

                    <div class="campo">
                        <label>Complemento</label>
                        <input type="text" id="editarComplemento">
                    </div>

                </div>

            </div>

            <div class="campo" style="margin-top: 14px;">
                <label>Observação</label>
                <textarea id="editarObservacao" rows="3"></textarea>
            </div>

            <div class="detalhe-acoes">
                <button onclick="fecharEditarPedido()" class="btn-secundario">
                    Cancelar
                </button>

                <button onclick="salvarEdicaoPedido()" class="btn-whatsapp">
                    Salvar alterações
                </button>
            </div>

        </div>

    </div>

</div>

<script src="../js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/pedidos.js"></script>

</body>

</html>
