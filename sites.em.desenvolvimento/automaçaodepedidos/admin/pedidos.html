>

<div class="filtros-status">

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Todos" 
            checked
        >
        Todos
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Recebido"
        >
        Recebido

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Preparando"

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Pronto"
        >
        Pronto
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Entregue"
        >
        Entregue
    </label>

    <label>
        <input 
            type="checkbox" 
            class="filtro-status" 
            value="Cancelado"
        >
