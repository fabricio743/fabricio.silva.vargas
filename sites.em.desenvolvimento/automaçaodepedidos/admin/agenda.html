<main class="content">

<header class="topbar">
<h2>Agenda de Produção</h2>
</header>

<div class="agenda-card">

<label>Data</label>
<input type="date">

<label>Status</label>

<select>
<option>Aberto para Pedidos</option>
<option>Fechado</option>
</select>

<hr>

<label>Horário Inicial</label>
<input type="time" value="10:00">

<label>Horário Final</label>
<input type="time" value="15:00">

<label>Intervalo</label>

<select>
<option>15 minutos</option>
<option selected>30 minutos</option>
<option>60 minutos</option>
</select>

<hr>

<label>Limite de Pedidos por Horário</label>
<input type="number" value="5">

<hr>

<h3>Produção do Dia</h3>

<div id="produtosAgenda"></div>

<button id="btnSalvarAgenda" onclick="salvarAgenda()">
    Salvar Agenda
</button>

</div>

<br>

<div id="listaAgenda"></div>
