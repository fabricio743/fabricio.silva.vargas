<main class="content">

<header class="topbar">

<h2>Configurações</h2>

</header>

<div class="config-card">

    <h3>Empresa</h3>

    <label>Nome da Empresa</label>
    <input 
        type="text" 
        id="configNomeEmpresa"
        placeholder="Ex: Assados Bonito"
    >

    <label>WhatsApp</label>
    <input 
        type="text" 
        id="configWhatsapp"
        placeholder="Ex: 55999999999"
    >

    <label>Logo</label>
    <input 
        type="file"
        id="configLogo"
    >

    <hr>

    <h3>Entrega</h3>

    <label>Taxa de Entrega</label>
    <input 
        type="number" 
        id="configTaxaEntrega"
        placeholder="Ex: 5"
    >

    <label>Pedido Mínimo</label>
    <input 
        type="number" 
        id="configPedidoMinimo"
        placeholder="Ex: 20"
    >

    <hr>

    <h3>PIX</h3>

    <label>Nome do Recebedor</label>
    <input 
        type="text"
        id="configPixNome"
        placeholder="Nome de quem recebe o PIX"
    >

    <label>Chave PIX</label>
    <input 
        type="text"
        id="configPixChave"
        placeholder="Digite a chave PIX"
    >

    <label>Tipo da Chave</label>

    <select id="configPixTipo">
        <option value="Telefone">Telefone</option>
        <option value="CPF">CPF</option>
        <option value="Email">Email</option>
        <option value="Aleatória">Aleatória</option>
    </select>

    <hr>

    <h3>Sistema</h3>

    <label>Status da Loja</label>

    <select id="configStatusLoja">
        <option value="ABERTO">Aberto</option>
        <option value="FECHADO">Fechado</option>
    </select>

    <label>Máximo de Pedidos por Horário</label>
    <input 
        type="number" 
        id="configMaxPedidosHorario"
        placeholder="Ex: 5"
    >

    <label>Tempo entre Horários</label>

    <select id="configTempoHorarios">
        <option value="15">15 minutos</option>
        <option value="30">30 minutos</option>
        <option value="60">60 minutos</option>
    </select>

    <label>Mensagem de Confirmação</label>

    <textarea 
        id="configMensagemConfirmacao"
        placeholder="Ex: Pedido recebido com sucesso! Em breve confirmaremos pelo WhatsApp."
    ></textarea>

    <button 
        class="salvar"
        onclick="salvarConfiguracoes()"
    >
        Salvar Configurações
    </button>

</div>

</main>

<script src="../js/config.js"></script>
